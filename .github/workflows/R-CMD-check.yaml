# Workflow derived from https://github.com/r-lib/actions
# Learn more about the actions at https://github.com/r-lib/actions/tree/v2/examples

name: R-CMD-check

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    # Weekly check to catch breaking changes in dependencies
    - cron: '0 0 * * 0'
  workflow_dispatch:  # Allow manual triggering

jobs:
  R-CMD-check:
    runs-on: ${{ matrix.config.os }}

    name: ${{ matrix.config.os }} (${{ matrix.config.r }})

    strategy:
      fail-fast: false
      matrix:
        config:
          # Linux: Latest R + release
          - {os: ubuntu-latest, r: 'release'}
          - {os: ubuntu-latest, r: 'oldrel-1'}
          # macOS: Latest R
          - {os: macOS-latest, r: 'release'}
          # Windows: Latest R + oldrel (common user platforms)
          - {os: windows-latest, r: 'release'}
          - {os: windows-latest, r: 'oldrel-1'}

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes
      # Suppress interactive prompts during checks
      _R_CHECK_FORCE_SUGGESTS_: false
      _R_CHECK_CRAN_INCOMING_: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          use-public-rspm: true  # Faster package downloads on Linux

      - name: Set up R dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: |
            any::rcmdcheck
            any::covr  # Optional: keep for local coverage, not uploaded
          needs: check

      - name: Session info (debugging)
        run: |
          Rscript -e "sessionInfo()"
          Rscript -e "packageVersion('pMEM')"

      - name: Check package
        uses: r-lib/actions/check-r-package@v2
        with:
          upload-snapshots: true
          build_args: 'c("--no-manual", "--no-build-vignettes")'
          check_args: >-
            --as-cran
            --no-manual
            --no-build-vignettes
            --run-donttest
            --run-dontrun
          error-on: '"error"'  # Fail on ERROR, warn on WARNING/NOTE

      - name: Show test output on failure
        if: failure()
        run: |
          # Display check results for debugging
          if [ -d "check" ]; then
            echo "=== CHECK LOGS ==="
            cat check/00check.log || true
            echo -e "\n=== INSTALL LOGS ==="
            cat check/00install.out || true
            echo -e "\n=== TEST LOGS ==="
            find check -name "*.Rout" -exec cat {} \; || true
          fi

      - name: Upload check results as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: check-results-${{ runner.os }}-R${{ matrix.config.r }}
          path: check
          retention-days: 7